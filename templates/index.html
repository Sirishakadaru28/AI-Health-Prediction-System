<!DOCTYPE html>

<html>

<head>

<title>AI Health Prediction</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">


<link rel="stylesheet" href="/static/style.css">


</head>


<body>


<nav class="navbar navbar-dark bg-primary">

<div class="container">

<span class="navbar-brand">

🩺 MIRA Health Prediction System

</span>

</div>

</nav>



<div class="container mt-5">


<div class="card shadow">

<div class="card-header bg-info text-white">

<h4>
Patient Health Details
</h4>

</div>


<div class="card-body">


<form action="/add" method="post">


<div class="row">


<div class="col-md-4">

<label>Full Name</label>

<input class="form-control"
name="name"
required>

</div>



<div class="col-md-4">

<label>Date Of Birth</label>

<input type="date"
class="form-control"
name="dob"
required>

</div>



<div class="col-md-4">

<label>Email</label>

<input type="email"
class="form-control"
name="email"
required>

</div>


</div>



<br>


<div class="row">


<div class="col-md-4">

<label>Glucose Level</label>

<input class="form-control"
name="glucose"
required>

</div>



<div class="col-md-4">

<label>Haemoglobin</label>

<input class="form-control"
name="haemoglobin"
required>

</div>



<div class="col-md-4">

<label>Cholesterol</label>

<input class="form-control"
name="cholesterol"
required>

</div>


</div>



<br>



<button class="btn btn-success">

Predict Health Condition

</button>



</form>


</div>

</div>



<br>



<div class="card shadow">


<div class="card-header bg-secondary text-white">

<h4>
Patient Records
</h4>

</div>



<table class="table table-hover">


<tr>

<th>Name</th>

<th>Email</th>

<th>Glucose</th>

<th>HB</th>

<th>Cholesterol</th>

<th>AI Remarks</th>

<th>Actions</th>

</tr>



{% for p in patients %}



<tr>


<td>{{p.name}}</td>

<td>{{p.email}}</td>

<td>{{p.glucose}}</td>

<td>{{p.haemoglobin}}</td>

<td>{{p.cholesterol}}</td>



<td>

<span class="badge bg-primary">

{{p.remarks}}

</span>


</td>



<td>


<a class="btn btn-warning btn-sm"
href="/edit/{{p.id}}">

Edit

</a>



<a class="btn btn-danger btn-sm"
href="/delete/{{p.id}}">

Delete

</a>



</td>


</tr>


{% endfor %}


</table>


</div>



</div>


</body>


</html>
