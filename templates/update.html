<html>

<head>

<title>Update Patient</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>


<body class="container mt-5">


<div class="card shadow">


<div class="card-header bg-warning">

<h3>
Update Patient Record
</h3>

</div>



<div class="card-body">


<form action="/update/{{patient.id}}" method="post">


<label>Name</label>

<input class="form-control"
name="name"
value="{{patient.name}}">



<label>DOB</label>

<input type="date"
class="form-control"
name="dob"
value="{{patient.dob}}">



<label>Email</label>

<input class="form-control"
name="email"
value="{{patient.email}}">



<label>Glucose</label>

<input class="form-control"
name="glucose"
value="{{patient.glucose}}">



<label>Haemoglobin</label>

<input class="form-control"
name="haemoglobin"
value="{{patient.haemoglobin}}">



<label>Cholesterol</label>

<input class="form-control"
name="cholesterol"
value="{{patient.cholesterol}}">



<br>



<button class="btn btn-success">

Update Prediction

</button>


</form>


</div>

</div>


</body>

</html>
